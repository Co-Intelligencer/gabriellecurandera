name: Add Google Analytics

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/add-google-analytics.yml

permissions:
  contents: write

jobs:
  install:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Insert Google tag into site head
        shell: python
        run: |
          from pathlib import Path

          path = Path("index.html")
          html = path.read_text(encoding="utf-8")
          measurement_id = "G-FD31STW1LN"

          if measurement_id not in html:
              tag = '''    <!-- Google tag (gtag.js) -->
              <script async src="https://www.googletagmanager.com/gtag/js?id=G-FD31STW1LN"></script>
              <script>
                window.dataLayer = window.dataLayer || [];
                function gtag(){dataLayer.push(arguments);}
                gtag('js', new Date());

                gtag('config', 'G-FD31STW1LN');
              </script>
          '''
              html = html.replace("<head>\n", "<head>\n" + tag, 1)
              path.write_text(html, encoding="utf-8")

      - name: Commit and publish
        run: |
          if git diff --quiet -- index.html; then
            echo "Google Analytics tag already installed."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Install Google Analytics"
          git push
